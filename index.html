<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uma pergunta para Lulu</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#7bade7,#ffeef6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:auto;

}

.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
max-width:420px;
width:90%;
position:relative;
z-index:1;

max-height:80vh;
overflow-y:auto;
}


h1{
color:#638edf;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button:hover{
transform:scale(1.05);
}

.yes{
background:#4d8bff;
color:white;
}

.no{
background:#999;
color:white;
position:relative;
}

.heart{
position:absolute;
font-size:20px;
animation:fall 5s linear infinite;
pointer-events:none;
z-index:0;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>

</head>

<body>

<div class="container" id="screen">

<h1>Lulu...</h1>

<p>O Gus preparou uma coisinha pra você</p>

<button class="yes" onclick="start()">começar</button>

</div>

<script>

let startTime
let noSize = 1

function start(){

startTime = Date.now()

document.getElementById("screen").innerHTML = `

<h1>Lulu, você ama o Gus?</h1>

<button class="yes" onclick="loveExplosion(); next1()">sim</button>
<button class="no" id="no">não</button>

`

moveButton()

}

function moveButton(){

const no = document.getElementById("no")

no.addEventListener("mouseover", escape)
no.addEventListener("touchstart", escape)

}

function escape(){

const no = document.getElementById("no")

const maxX = window.innerWidth - 100
const maxY = window.innerHeight - 50

const randomX = Math.random() * maxX
const randomY = Math.random() * maxY

no.style.position = "absolute"
no.style.left = randomX + "px"
no.style.top = randomY + "px"

noSize -= 0.1

if(noSize < 0.4){
noSize = 0.4
}

no.style.transform = "scale(" + noSize + ")"

const frases = [
"não 😡",
"para",
"Lulu por favor",
"isso é pressão",
"não consigo fugir"
]

no.innerText = frases[Math.floor(Math.random()*frases.length)]

}

function next1(){

document.getElementById("screen").innerHTML = `

<h1>hmmm...</h1>

<p>Mas o quanto você o ama?</p>

<button class="yes" onclick="next2()">muito</button>
<button class="yes" onclick="next2()">MUITO MESMO</button>

`

}

function next2(){

document.getElementById("screen").innerHTML = `

<h1>analisando sentimentos do Lulu...</h1>

<p id="loading">iniciando análise...</p>

`

setTimeout(()=>{
document.getElementById("loading").innerText="acessando banco de dados emocional..."
},1500)

setTimeout(()=>{
document.getElementById("loading").innerText="detectando nível de amor..."
},3000)

setTimeout(()=>{
document.getElementById("loading").innerText="consultando..."
},4500)

setTimeout(()=>{
next3()
},6000)

}

function next3(){

const time = Math.floor((Date.now() - startTime)/1000)

document.getElementById("screen").innerHTML = `

<h1>resultado da análise</h1>

<p>Lulu demorou <b>${time}</b> segundos para admitir que ama o Gus.</p>

<p><b>diagnóstico final:</b> amor confirmado ✅</p>

<button class="yes" onclick="next4()">continuar</button>

`

}

function next4(){

document.getElementById("screen").innerHTML = `

<h1>relatório final</h1>

<p>Oi Lulu.</p>

<p>Eu analisei tudo aqui...</p>

<p>E parece que você gosta bastante de mim.</p>

<p>Tipo... bastante mesmo.</p>

<p>Então trate de continuar assim, ok?</p>

<button class="yes" onclick="letter()">prometo</button>

`

}

function letter(){

document.getElementById("screen").innerHTML = `

<h1>Gus deixou uma mensagem...</h1>

<p id="carta"></p>

`

typeLetter()
hearts()

}

function hearts(){

for(let i=0;i<25;i++){

const heart = document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

}

}

function typeLetter(){

const text = `Lulu...

tem uma coisinha que eu queria te contar.

algumas semanas atrás
eu te perguntei que horas você nasceu.

e você me disse:
9h20 da manhã.

pode parecer um detalhe pequeno...

mas desde aquele dia
esse horário virou especial pra mim.

eu coloquei um despertador
para tocar todos os dias às 9h20.

e sempre que ele toca
eu lembro de uma coisa simples:

foi nesse horário
que você chegou ao mundo.

e só o fato de você existir
já significa muito pra mim.

então todos os dias
quando o despertador toca

a primeira coisa que eu penso
é em você.

eu lembro do horário
em que você nasceu

e do quanto
você é importante pra mim.

aí eu vou lá
e te mando bom dia.

mas tem outra coisa
que eu gosto muito também.

quando eu acordo
e vejo que o seu bom dia
já está lá

porque você acorda antes
para ir pra escola...

mesmo sendo um bom dia simples
isso sempre deixa meu dia melhor.

eu pensei que talvez
um dia você fosse notar
o horário...

mas como você não notou
eu resolvi te contar agora.

porque a verdade é que

9h20 virou
um dos meus horários favoritos.

é o horário em que eu paro
por um instante

e lembro de você.

mesmo nos dias
em que eu estou péssimo

às vezes você fala
alguma coisa simples

ou faz algo pequeno

e mesmo assim
consegue arrancar
um sorriso de mim.

e isso é muito especial.

eu gosto muito
do que a gente tem.

e sendo sincero...

eu não quero perder isso.

não quero perder você.

eu só espero
que a gente possa continuar assim

fazendo parte
da vida um do outro

por muito mais tempo.

— Gus
`

let i = 0
const speed = 40

function typing(){

if(i < text.length){

document.getElementById("carta").innerHTML += text.charAt(i)

i++

setTimeout(typing, speed)

}else{

showRestartButton()

}

}

typing()

}

function showRestartButton(){

const button = document.createElement("button")

button.innerText = "jogar de novo"

button.className = "yes"

button.onclick = function(){
location.reload()
}

document.getElementById("screen").appendChild(button)

setTimeout(showSecretButton, 4000)

}

function showSecretButton(){

const button = document.createElement("button")

button.innerText = "🐶 mensagem secreta"

button.className = "yes"

button.style.marginTop = "15px"

button.onclick = function(){
alert("Gus aqui.\n\nSim, eu estou analisando todas as suas respostas.\n\naté agora... aprovado, eu te amo. ")
}

document.getElementById("screen").appendChild(button)

}

function loveExplosion(){

for(let i=0;i<35;i++){

const heart = document.createElement("div")

heart.innerHTML="💖"

heart.style.position="absolute"
heart.style.left=Math.random()*100+"vw"
heart.style.top=Math.random()*100+"vh"
heart.style.fontSize="26px"
heart.style.pointerEvents="none"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},2000)

}

}

function floatingHearts(){

setInterval(()=>{

const heart = document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},5000)

},900)

}

floatingHearts()

</script>

</body>
</html>
